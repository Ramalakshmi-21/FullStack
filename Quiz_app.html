<!DOCTYPE html>
<html>
<head>
    <title>Quiz Application</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        .quiz-box {
            background: white;
            width: 420px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        #options {
            text-align: left;
            margin: 20px 0;
        }

        #options label {
            display: block;
            background: #f1f3ff;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        #options label:hover {
            background: #dbe0ff;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        button {
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        #next {
            background: #667eea;
            color: white;
        }

        #prev {
            background: #aaa;
            color: white;
        }

        #next:hover {
            background: #5563d8;
        }

        #prev:hover {
            background: #888;
        }

        .result {
            display: none;
        }

        #score {
            font-size: 22px;
            color: #764ba2;
        }

        #restart {
            background: #ff7675;
            color: white;
            margin-top: 15px;
        }

        #restart:hover {
            background: #e55050;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="quiz-box">
    <h2 id="question"></h2>

    <div id="options"></div>

    <button id="prev">Previous</button>
    <button id="next">Next</button>

    <div class="result">
        <h3 id="score"></h3>
        <button id="restart">Restart Quiz</button>
    </div>
</div>

<script src="ex3.js"></script>
</body>
</html>
