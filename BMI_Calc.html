<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Professional BMI Calculator</title>

    <style>
      /* Modern Reset & Font */

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);

        display: flex;

        justify-content: center;

        align-items: center;

        height: 100vh;

        margin: 0;
      }

      /* The Card Container */

      .calculator-card {
        background: white;

        padding: 2rem;

        border-radius: 12px;

        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);

        width: 100%;

        max-width: 400px;
      }

      h2 {
        color: #2d3436;

        margin-top: 0;

        text-align: center;

        font-weight: 600;
      }

      p.subtitle {
        text-align: center;

        color: #636e72;

        font-size: 0.9rem;

        margin-bottom: 1.5rem;
      }

      /* Form Styling */

      .form-group {
        margin-bottom: 1.2rem;
      }

      label {
        display: block;

        margin-bottom: 0.5rem;

        color: #2d3436;

        font-weight: 500;

        font-size: 0.9rem;
      }

      input {
        width: 100%;

        padding: 12px;

        border: 1px solid #dfe6e9;

        border-radius: 6px;

        box-sizing: border-box; /* Ensures padding doesn't affect width */

        font-size: 1rem;

        transition: border-color 0.3s ease;
      }

      input:focus {
        outline: none;

        border-color: #0984e3;

        box-shadow: 0 0 0 3px rgba(9, 132, 227, 0.1);
      }

      button {
        width: 100%;

        padding: 14px;

        background-color: #0984e3;

        color: white;

        border: none;

        border-radius: 6px;

        font-size: 1rem;

        font-weight: 600;

        cursor: pointer;

        transition:
          background-color 0.3s ease,
          transform 0.1s ease;
      }

      button:hover {
        background-color: #074b83;
      }

      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>

  <body>
    <div class="calculator-card">
      <h2>BMI Calculator</h2>

      <p class="subtitle">Enter your details to track your health.</p>

      <form action="/calculate" method="POST">
        <div class="form-group">
          <label for="weight">Weight (kg)</label>

          <input
            type="number"
            id="weight"
            name="weight"
            placeholder="e.g. 70"
            required
          />
        </div>

        <div class="form-group">
          <label for="height">Height (meters)</label>

          <input
            type="number"
            id="height"
            step="0.01"
            name="height"
            placeholder="e.g. 1.75"
            required
          />
        </div>

        <button type="submit">Calculate BMI</button>
      </form>
    </div>
  </body>
</html>
